name: "Trivy Vulnerability Scan"
description: "Run Trivy scan and upload results"

inputs:
  image-ref:
    description: "The Docker image reference to scan (e.g., ghcr.io/org/app:tag)"
    required: true
  severity:
    description: "Severity levels to fail on (UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL)"
    required: false
    default: "CRITICAL"
  ignore-unfixed:
    description: "Whether to ignore vulnerabilities without a fix (true/false)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Run Trivy scan
      uses: aquasecurity/trivy-action@0.34.1
      with:
        scan-type: 'image'
        image-ref: ${{ inputs.image-ref }}
        severity: ${{ inputs.severity }}
        ignore-unfixed: ${{ inputs.ignore-unfixed }}
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'