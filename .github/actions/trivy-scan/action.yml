name: "Trivy Vulnerability Scan"
author: stemys SA
description: "Run Trivy scan and upload results"

inputs:
  image-ref:
    description: "The Docker image reference to scan (e.g., ghcr.io/org/app:tag)"
    required: true
  severity:
    description: "Severity levels to fail on (UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL)"
    required: false
    default: "CRITICAL"
  ignore-unfixed:
    description: "Whether to ignore vulnerabilities without a fix (true/false)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Run Trivy scan
      uses: aquasecurity/trivy-action@0.34.1
      with:
        scan-type: image
        image-ref: ${{ inputs.image-ref }}
        severity: ${{ inputs.severity }}
        ignore-unfixed: ${{ inputs.ignore-unfixed }}
        format: json
        output: trivy-results.json
        exit-code: 0

    - name: Upload Trivy results as artifact
      uses: actions/upload-artifact@v4
      with:
        name: trivy-scan-results
        path: trivy-results.json
        retention-days: 5

    - name: Fail build if vulnerabilities found
      uses: aquasecurity/trivy-action@0.34.1
      with:
        scan-type: image
        image-ref: ${{ inputs.image-ref }}
        severity: ${{ inputs.severity }}
        ignore-unfixed: ${{ inputs.ignore-unfixed }}
        format: table
        exit-code: 1
        skip-setup-trivy: true