name: "Yarn install and audit"
author: stemys SA
description: "Install Node.js, run yarn install with frozen lockfile and then run yarn audit"
inputs:
  node-version:
    description: "The Node.js version to use (e.g., 24)"
    required: true
  severity:
    description: "Severity levels to fail on (info|low|moderate|high|critical)"
    required: false
    default: "critical"
  skip-audit:
    description: "If true, skip the yarn audit"
    required: false
    default: "false"
  token:
    description: Personal access token (PAT) used to create comment on Pull Request (PR)
    required: false

runs:
  using: "composite"
  steps:
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      uses: borales/actions-yarn@v4
      with:
        cmd: install --frozen-lockfile

    - name: Run yarn audit
      if: inputs.skip-audit == 'false'
      shell: bash
      run: |
        yarn audit > yarn-audit-results.txt || true

    - name: Upload Yarn audit results as artifact
      uses: actions/upload-artifact@v4
      with:
        name: yarn-audit-results
        path: yarn-audit-results.txt
        retention-days: 5

    - name: Set yarn audit results output
      if: |
        github.event_name == 'pull_request' &&
        inputs.skip-audit == 'false'
      id: output-audit-result
      shell: bash
      run: |
        echo "audit-result<<EOF" >> $GITHUB_OUTPUT
        cat yarn-audit-results.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Find Comment
      if: |
        github.event_name == 'pull_request' &&
        inputs.skip-audit == 'false'
      uses: peter-evans/find-comment@v3
      id: fc
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: 'github-actions[bot]'
        body-includes: Yarn Audit
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Create or update comment
      if: |
        github.event_name == 'pull_request' &&
        inputs.skip-audit == 'false'
      uses: peter-evans/create-or-update-comment@v5
      with:
        comment-id: ${{ steps.fc.outputs.comment-id }}
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          Yarn Audit
          ${{ steps.output-audit-result.outputs.audit-result }}
        edit-mode: replace
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Fail if critical dependencies found
      if: inputs.skip-audit == 'false'
      uses: borales/actions-yarn@v4
      with:
        cmd: audit --groups dependencies --level ${{ inputs.severity }}